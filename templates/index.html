<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>	Prediksi Kelulusan C45 dan CART</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="w-full max-w-lg bg-white p-8 rounded-xl shadow-lg">

    <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">
        🎓 Prediksi Kelulusan Mahasiswa
    </h1>

    <p class="text-center text-gray-500 mb-8">
        Masukkan data akademik mahasiswa untuk memprediksi status kelulusan.
    </p>

    <!-- FORM INPUT -->
    <form action="/" method="POST" class="space-y-6">

        <!-- Attendance -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Persentase Kehadiran (%)
            </label>
            <input type="number" name="attendance" min="0" max="100" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md">
        </div>

        <!-- Internal Test 1 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Nilai UTS (0–40)
            </label>
            <input type="number" name="test1" min="0" max="40" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md">
        </div>

        <!-- Internal Test 2 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Nilai UAS (0–40)
            </label>
            <input type="number" name="test2" min="0" max="40" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md">
        </div>

        <!-- Assignment -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Tugas (0–10)
            </label>
            <input type="number" name="assignment" min="0" max="10" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md">
        </div>

        <!-- Study Hours -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Jam Belajar per Hari
            </label>
            <input type="number" name="study_hours" min="0" max="24" step="0.1" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md">
        </div>

        <!-- Button -->
        <button type="submit"
                class="w-full py-3 rounded-md text-white bg-indigo-600 hover:bg-indigo-700">
            Prediksi Sekarang
        </button>
    </form>

    <!-- HASIL -->
    {% if prediction_text %}
<div class="mt-8 p-4 rounded-md 
    {% if is_error %}bg-red-100 text-red-800{% else %}bg-green-100 text-green-800{% endif %}">
    
    <p class="font-semibold">{{ prediction_text|safe }}</p>
</div>
{% endif %}

</div>
</body>
</html>
